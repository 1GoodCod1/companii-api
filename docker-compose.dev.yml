# Faber Companii — dev stack (API + Postgres + Redis)
services:
  postgres:
    image: postgres:18
    container_name: companii-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-companii}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-companii}
      TZ: Europe/Chisinau
    ports:
      - "5433:5432"
    volumes:
      - companii_postgres_data:/var/lib/postgresql
      - ./docker/backups:/backups
    networks:
      - companii-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: companii-redis
    ports:
      - "6380:6379"
    volumes:
      - companii_redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - companii-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: companii-api-dev
    ports:
      - "4100:4100"
    environment:
      TZ: Europe/Chisinau
      NODE_OPTIONS: "--use-system-ca"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
    env_file:
      - ./.env.docker
    volumes:
      - ./src:/app/src
      - ./nest-cli.json:/app/nest-cli.json
      - ./prisma:/app/prisma
      - ./assets:/app/assets
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - companii-network
    command: npm run start:dev
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4100/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  companii-network:
    driver: bridge

volumes:
  companii_postgres_data:
  companii_redis_data:
