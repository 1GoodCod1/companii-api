name: Docker Stack Health Check

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 02:00 UTC
  workflow_dispatch:

jobs:
  stack-health-check:
    name: API Stack Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for dev stack
        run: |
          cat > .env << EOF
          DATABASE_URL=postgresql://postgres:postgres@postgres:5432/companii
          REDIS_URL=redis://redis:6379
          JWT_SECRET=test-jwt-secret-32-chars-for-ci-runner
          NODE_ENV=development
          PORT=4100
          EOF

      - name: Start stack
        run: |
          docker compose -f docker-compose.dev.yml up -d
          sleep 30

      - name: Check PostgreSQL health
        run: docker compose -f docker-compose.dev.yml exec -T postgres pg_isready -U postgres

      - name: Check Redis health
        run: docker compose -f docker-compose.dev.yml exec -T redis redis-cli ping

      - name: Apply migrations
        run: docker compose -f docker-compose.dev.yml exec -T api npx prisma migrate deploy

      - name: Probe API health endpoint
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:4100/health; do sleep 3; done'
          curl -fsS http://localhost:4100/health

      - name: Service logs (on failure)
        if: failure()
        run: |
          echo "=== Postgres ==="
          docker compose -f docker-compose.dev.yml logs postgres
          echo "=== Redis ==="
          docker compose -f docker-compose.dev.yml logs redis
          echo "=== API ==="
          docker compose -f docker-compose.dev.yml logs api

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v
