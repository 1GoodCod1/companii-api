# Faber Companii — production stack (API + Postgres + Redis)
services:
  postgres:
    image: postgres:18
    container_name: companii-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Europe/Chisinau
    ports:
      - "${PORT_POSTGRES:-127.0.0.1:5434:5432}"
    volumes:
      - companii_postgres_prod:/var/lib/postgresql
      - ./docker/backups:/backups
    networks:
      - companii-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: companii-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - companii_redis_prod:/data
    networks:
      - companii-prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: companii-api-prod
    env_file:
      - .env
    environment:
      TZ: Europe/Chisinau
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_APP_USER:-companii_app}:${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-companii}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - companii-prod
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4100/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  companii-prod:
    driver: bridge

volumes:
  companii_postgres_prod:
  companii_redis_prod:
